a{color:var(--gold)}

.hdr-in{max-width:1180px;margin:0 auto;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:14px}
.logo-sym{width:40px;height:40px;border:1px solid var(--brd);background:var(--card);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:17px}
.logo-mark{font-size:9px;letter-spacing:.28em;font-weight:500;color:var(--tm);text-transform:uppercase}
.logo-name{font-family:var(--fd);font-size:16px;margin-top:2px}
.lang{display:inline-flex;border:1px solid var(--brd);overflow:hidden}
.lang button{background:transparent;border:0;padding:9px 12px;font-size:10px;letter-spacing:.18em;font-weight:600;color:var(--tm);cursor:pointer;font-family:var(--fn)}
.lang button.on{background:var(--ac);color:#fff}
main{padding:54px 0 80px}
h1{font-size:42px;margin-bottom:28px}
h2{font-size:22px;margin:30px 0 10px}
p{color:var(--tm);margin-bottom:14px}
.box{background:var(--card);border:1px solid var(--brd);padding:28px;margin-top:6px}
.muted{color:#9c978d;font-size:13px;margin-top:30px}
.footer{border-top:1px solid var(--brd);padding:24px 0;color:var(--tm);font-size:13px;margin-top:40px;text-align:center}
.footer a{color:var(--tm);margin:0 10px}

function setLang(l){

  LANG = l; localStorage.setItem("clubcheck_lang", l);
  document.documentElement.lang = l; render();
}
function t(k){ return I18N[LANG][k] || I18N.de[k] || k; }
