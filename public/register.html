<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Humatrix ClubCheck — Registrierung</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#030B15;color:#E8F0F8;min-height:100vh}
    .wrap{max-width:620px;margin:0 auto;padding:28px 18px 60px}
    .brand{text-align:center;margin-bottom:20px;font-weight:900;letter-spacing:3px}
    .card{background:#0A1628;border:1px solid rgba(0,212,255,.15);border-radius:18px;padding:22px;margin-bottom:14px}
    h1{font-size:26px;margin-bottom:8px}
    h2{font-size:20px;margin-bottom:8px}
    p{color:#93AABB;line-height:1.5;margin-bottom:14px}
    label{display:block;font-size:12px;color:#00D4FF;font-weight:700;margin:14px 0 6px;letter-spacing:.5px}
    input,select,textarea{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(0,212,255,.18);background:#030B15;color:#E8F0F8;font-size:15px;outline:none}
    textarea{min-height:70px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn{width:100%;padding:15px;border-radius:12px;border:0;background:#00D4FF;color:#030B15;font-weight:900;letter-spacing:1px;cursor:pointer;margin-top:14px}
    .btn.secondary{background:transparent;color:#00D4FF;border:1px solid rgba(0,212,255,.25)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .plans{display:grid;gap:10px}
    .plan{padding:16px;border:1px solid rgba(255,255,255,.08);border-radius:14px;background:#111E33;cursor:pointer}
    .plan.active{border-color:#00D4FF;box-shadow:0 0 0 1px rgba(0,212,255,.2)}
    .planTop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .price{font-size:26px;font-weight:900;color:#00D4FF}
    .muted{color:#93AABB;font-size:13px}
    .err{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:#FCA5A5;border-radius:12px;padding:12px;margin-bottom:14px}
    .ok{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);color:#86EFAC;border-radius:12px;padding:12px;margin-bottom:14px}
    .steps{display:flex;gap:5px;margin:16px 0 22px}
    .dot{height:4px;flex:1;background:#111E33;border-radius:99px}
    .dot.on{background:#00D4FF}
    .code{font-size:44px;letter-spacing:6px;color:#00D4FF;font-weight:900;text-align:center;margin:18px 0}
    a{color:#00D4FF}
    @media(max-width:560px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">HUMATRIX · CLUBCHECK</div>
    <div id="app"></div>
  </div>

<script>
const app = document.getElementById("app");

const PLANS = {
  basic: {
    name: "Basic",
    price: 199,
    desc: "Bis 100 Mitglieder · 12 Wochen"
  },
  plus: {
    name: "Plus",
    price: 299,
    desc: "Bis 250 Mitglieder · 12 Wochen"
  },
  premium: {
    name: "Premium",
    price: 499,
    desc: "Bis 500 Mitglieder · 12 Wochen"
  }
};

let step = 1;
let error = "";

let form = {
  firstName: "",
  lastName: "",
  email: "",
  phone: "",
  password: "",
  password2: "",
  clubName: "",
  package: "plus",
  q1: "",
  q2: "",
  q3: "",
  acceptTerms: false
};

const params = new URLSearchParams(window.location.search);

if (params.get("pkg")) {
  const p = params.get("pkg").toLowerCase();
  if (p === "basic" || p === "plus" || p === "premium") form.package = p;
  if (p === "starter") form.package = "basic";
  if (p === "standard") form.package = "plus";
}

if (params.get("status") === "success") {
  renderSuccess(params.get("code") || "");
} else if (params.get("status") === "cancelled") {
  error = "Die Zahlung wurde abgebrochen. Du kannst sie erneut starten.";
  render();
} else {
  render();
}

function esc(v) {
  return String(v || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function setValue(key, value) {
  form[key] = value;
}

function dots() {
  let html = '<div class="steps">';
  for (let i = 1; i <= 4; i++) {
    html += `<div class="dot ${i <= step ? "on" : ""}"></div>`;
  }
  html += '</div>';
  return html;
}

function render() {
  if (step === 1) return renderAccount();
  if (step === 2) return renderPlan();
  if (step === 3) return renderClub();
  if (step === 4) return renderPayment();
}

function showError() {
  return error ? `<div class="err">${esc(error)}</div>` : "";
}

function renderAccount() {
  app.innerHTML = `
    ${dots()}
    ${showError()}
    <div class="card">
      <h1>Konto anlegen</h1>
      <p>Diese Daten werden für die ClubCheck-Administration und die Zahlungszuordnung verwendet.</p>

      <div class="row">
        <div>
          <label>Vorname</label>
          <input id="firstName" value="${esc(form.firstName)}" />
        </div>
        <div>
          <label>Nachname</label>
          <input id="lastName" value="${esc(form.lastName)}" />
        </div>
      </div>

      <label>E-Mail</label>
      <input id="email" type="email" value="${esc(form.email)}" />

      <label>Telefon</label>
      <input id="phone" value="${esc(form.phone)}" />

      <div class="row">
        <div>
          <label>Passwort</label>
          <input id="password" type="password" value="${esc(form.password)}" />
        </div>
        <div>
          <label>Passwort wiederholen</label>
          <input id="password2" type="password" value="${esc(form.password2)}" />
        </div>
      </div>

      <button class="btn" onclick="nextAccount()">Weiter</button>
    </div>
  `;

  bindInputs(["firstName", "lastName", "email", "phone", "password", "password2"]);
}

function renderPlan() {
  app.innerHTML = `
    ${dots()}
    ${showError()}
    <div class="card">
      <h1>Paket wählen</h1>
      <p>Die Zahlung läuft sicher über Stripe. Die Freischaltung erfolgt erst nach erfolgreichem Stripe-Webhook.</p>

      <div class="plans">
        ${Object.keys(PLANS).map(key => {
          const p = PLANS[key];
          return `
            <div class="plan ${form.package === key ? "active" : ""}" onclick="form.package='${key}';renderPlan()">
              <div class="planTop">
                <strong>${p.name}</strong>
                <span class="price">${p.price} €</span>
              </div>
              <div class="muted">${p.desc}</div>
            </div>
          `;
        }).join("")}
      </div>

      <button class="btn" onclick="step=3;error='';render()">Weiter</button>
      <button class="btn secondary" onclick="step=1;error='';render()">Zurück</button>
    </div>
  `;
}

function renderClub() {
  app.innerHTML = `
    ${dots()}
    ${showError()}
    <div class="card">
      <h1>Vereinsdaten</h1>
      <p>Diese Daten werden vor der Zahlung als „pending“ in Supabase gespeichert.</p>

      <label>Vereinsname</label>
      <input id="clubName" value="${esc(form.clubName)}" placeholder="z. B. SC Musterverein" />

      <label>Eigene Zusatzfrage 1 optional</label>
      <textarea id="q1">${esc(form.q1)}</textarea>

      <label>Eigene Zusatzfrage 2 optional</label>
      <textarea id="q2">${esc(form.q2)}</textarea>

      <label>Eigene Zusatzfrage 3 optional</label>
      <textarea id="q3">${esc(form.q3)}</textarea>

      <button class="btn" onclick="nextClub()">Weiter zur Zahlungsübersicht</button>
      <button class="btn secondary" onclick="step=2;error='';render()">Zurück</button>
    </div>
  `;

  bindInputs(["clubName", "q1", "q2", "q3"]);
}

function renderPayment() {
  const p = PLANS[form.package];

  app.innerHTML = `
    ${dots()}
    ${showError()}
    <div class="card">
      <h1>Zahlung</h1>
      <p>Du wirst jetzt zu Stripe weitergeleitet. Nach erfolgreicher Zahlung aktiviert Stripe über den Webhook deinen ClubCheck in Supabase.</p>

      <div class="plan active">
        <div class="planTop">
          <strong>ClubCheck ${p.name}</strong>
          <span class="price">${p.price} €</span>
        </div>
        <div class="muted">${p.desc}</div>
      </div>

      <label style="display:flex;gap:10px;align-items:flex-start;color:#E8F0F8;font-size:14px;letter-spacing:0;text-transform:none">
        <input id="acceptTerms" type="checkbox" style="width:auto;margin-top:2px" ${form.acceptTerms ? "checked" : ""} />
        <span>Ich akzeptiere die AGB und Datenschutzbedingungen und möchte kostenpflichtig bestellen.</span>
      </label>

      <button id="payBtn" class="btn" onclick="startCheckout()">Jetzt sicher mit Stripe bezahlen</button>
      <button class="btn secondary" onclick="step=3;error='';render()">Zurück</button>
    </div>
  `;

  document.getElementById("acceptTerms").onchange = e => {
    form.acceptTerms = e.target.checked;
  };
}

function bindInputs(ids) {
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    el.oninput = e => {
      form[id] = e.target.value;
      error = "";
    };
  });
}

function nextAccount() {
  ["firstName", "lastName", "email", "phone", "password", "password2"].forEach(id => {
    const el = document.getElementById(id);
    if (el) form[id] = el.value;
  });

  if (!form.firstName || !form.lastName || !form.email || !form.password) {
    error = "Bitte alle Pflichtfelder ausfüllen.";
    return render();
  }

  if (!form.email.includes("@") || !form.email.includes(".")) {
    error = "Bitte eine gültige E-Mail-Adresse eingeben.";
    return render();
  }

  if (form.password.length < 6) {
    error = "Das Passwort muss mindestens 6 Zeichen haben.";
    return render();
  }

  if (form.password !== form.password2) {
    error = "Die Passwörter stimmen nicht überein.";
    return render();
  }

  error = "";
  step = 2;
  render();
}

function nextClub() {
  ["clubName", "q1", "q2", "q3"].forEach(id => {
    const el = document.getElementById(id);
    if (el) form[id] = el.value;
  });

  if (!form.clubName.trim()) {
    error = "Bitte den Vereinsnamen eingeben.";
    return render();
  }

  error = "";
  step = 4;
  render();
}

async function startCheckout() {
  if (!form.acceptTerms) {
    error = "Bitte akzeptiere die Bedingungen, bevor du zur Zahlung gehst.";
    return render();
  }

  const btn = document.getElementById("payBtn");
  btn.disabled = true;
  btn.textContent = "Stripe wird vorbereitet ...";

  const questions = [form.q1, form.q2, form.q3]
    .map(text => String(text || "").trim())
    .filter(Boolean)
    .map(text => ({
      text,
      type: "scale",
      opts: []
    }));

  try {
    const res = await fetch("/api/create-checkout", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        package: form.package,
        email: form.email,
        phone: form.phone,
        password: form.password,
        clubName: form.clubName,
        contactName: `${form.firstName} ${form.lastName}`.trim(),
        questions
      })
    });

    const data = await res.json();

    if (!res.ok || !data.success || !data.url) {
      throw new Error(data.error || "Stripe konnte nicht gestartet werden.");
    }

    window.location.href = data.url;
  } catch (err) {
    error = err.message || "Zahlung konnte nicht gestartet werden.";
    render();
  }
}

function renderSuccess(code) {
  const cleanCode = String(code || "").toUpperCase();
  const surveyUrl = `${window.location.origin}/survey?c=${encodeURIComponent(cleanCode)}`;
  const dashboardUrl = `${window.location.origin}/dashboard?c=${encodeURIComponent(cleanCode)}`;

  app.innerHTML = `
    <div class="ok">Zahlung erfolgreich. Dein ClubCheck wurde angelegt. Die endgültige Freischaltung erfolgt über den Stripe-Webhook.</div>

    <div class="card">
      <h1>Registrierung abgeschlossen</h1>
      <p>Dein Club-Code:</p>
      <div class="code">${esc(cleanCode)}</div>

      <p>Umfrage-Link:</p>
      <input value="${esc(surveyUrl)}" readonly onclick="this.select()" />

      <button class="btn" onclick="copyLink('${surveyUrl}')">Umfrage-Link kopieren</button>
      <button class="btn secondary" onclick="window.location.href='${dashboardUrl}'">Zum Dashboard</button>
    </div>
  `;
}

function copyLink(link) {
  navigator.clipboard.writeText(link).then(() => {
    alert("Link kopiert.");
  }).catch(() => {
    alert("Bitte Link manuell kopieren.");
  });
}
</script>
</body>
</html>
