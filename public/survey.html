<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Humatrix ClubCheck</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#010C1A;--bg2:#061828;--bg3:#0b2236;--cyan:#2FA7BC;--cyan2:#2FA7BC;--gold:#FBBF24;--green:#34D399;--red:#F87171;--orange:#FB923C;--purple:#A78BFA;--blue:#60A5FA;--white:#E8F0F8;--muted:#4A6478;--text:#93AABB;--glow:0 0 30px rgba(47,167,188,.12)}
html,body{min-height:100dvh;background:var(--bg);font-family:'Barlow',Arial,sans-serif;color:var(--white);overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(47,167,188,.12)}50%{box-shadow:0 0 40px rgba(47,167,188,.25)}}
@keyframes scan{0%{top:-1px}100%{top:100%}}
@keyframes pulse2{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.w{max-width:440px;margin:0 auto;padding:16px 18px;min-height:100dvh}
/* Glass card */
.gc{background:linear-gradient(145deg,rgba(10,22,40,.95),rgba(17,30,51,.8));border:1px solid rgba(47,167,188,.07);border-radius:16px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.gc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(47,167,188,.15),transparent)}
.gc.glow{border-color:rgba(47,167,188,.2);box-shadow:var(--glow)}
/* Topbar */
.top{display:flex;justify-content:space-between;align-items:center;padding:6px 0 14px}
.top-l{font-family:Syne,sans-serif;font-size:17px;font-weight:800;letter-spacing:3px}
.top-r{display:flex;align-items:center;gap:8px}
.top-pct{font-family:Syne,sans-serif;font-size:20px;font-weight:900;color:var(--cyan)}
.top-cnt{font-size:11px;color:var(--muted)}
/* Progress */
.pbar{height:2px;background:var(--bg3);border-radius:1px;overflow:hidden;margin-bottom:18px}
.pfill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan2));transition:width .4s}
/* Section indicator */
.sec-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:14px;font-size:9px;font-weight:700;letter-spacing:1.5px;margin-bottom:14px}
/* Question */
.qt{font-size:17px;font-weight:600;line-height:1.5;margin-bottom:4px;min-height:52px}
.qsub{font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.4}
/* 7-point scale */
.sc7{display:flex;gap:5px;margin-bottom:5px}
.s7{flex:1;height:50px;border-radius:10px;border:1.5px solid rgba(255,255,255,.05);background:var(--bg2);color:var(--muted);font-size:17px;font-weight:700;font-family:Syne,sans-serif;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center}
.s7.on{border-color:var(--cyan);background:rgba(47,167,188,.1);color:var(--cyan);box-shadow:0 0 14px rgba(47,167,188,.12)}
.s7:active{transform:scale(.93)}
.sc-lbl{display:flex;justify-content:space-between;font-size:8px;font-weight:700;letter-spacing:.5px;margin-bottom:14px;padding:0 2px}
/* NPS 0-10 */
.nps{display:grid;grid-template-columns:repeat(11,1fr);gap:3px;margin-bottom:5px}
.np{height:38px;border-radius:8px;border:1.5px solid rgba(255,255,255,.05);background:var(--bg2);font-size:12px;font-weight:700;font-family:Syne,sans-serif;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center}
.np.on{box-shadow:0 0 10px rgba(47,167,188,.15)}
.np.d{color:var(--red)}.np.p{color:var(--gold)}.np.pr{color:var(--green)}
.np.on.d{border-color:var(--red);background:rgba(248,113,113,.1)}
.np.on.p{border-color:var(--gold);background:rgba(251,191,36,.1)}
.np.on.pr{border-color:var(--green);background:rgba(52,211,153,.1)}
/* Choices */
.chs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.ch{padding:10px 16px;border-radius:10px;border:1.5px solid rgba(255,255,255,.06);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;transition:all .12s}
.ch.on{border-color:var(--cyan);background:rgba(47,167,188,.08);color:var(--cyan);font-weight:700}
/* Buttons */
.btn{width:100%;padding:16px;border-radius:12px;border:none;font-family:Syne,sans-serif;font-size:16px;font-weight:800;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:6px}
.btn.go{background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:var(--bg);animation:glow 3s infinite}
.btn.off{background:var(--bg3);color:var(--muted);cursor:default}
.btn2{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(47,167,188,.1);background:transparent;color:var(--cyan);font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;font-family:'DM Sans',sans-serif}
/* Nav */
.nav{display:flex;gap:8px;margin-top:10px}
.nb{flex:1;padding:12px;border-radius:10px;border:1px solid rgba(47,167,188,.1);background:transparent;color:var(--cyan);font-size:12px;font-weight:600;cursor:pointer;font-family:Syne,sans-serif;letter-spacing:1px}
.nb.pri{border:none;background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:var(--bg);font-weight:800}
/* Input */
.inp{width:100%;padding:14px 16px;background:var(--bg2);border:1.5px solid rgba(47,167,188,.1);border-radius:12px;color:var(--white);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;letter-spacing:.5px}
.inp:focus{border-color:rgba(47,167,188,.35);box-shadow:0 0 20px rgba(47,167,188,.06)}
.inp::placeholder{color:var(--muted)}
.lbl{font-size:11px;color:var(--cyan);font-weight:600;letter-spacing:.5px;margin-bottom:5px}
/* Textarea */
.ta{width:100%;min-height:90px;padding:14px;background:var(--bg2);border:1.5px solid rgba(47,167,188,.1);border-radius:12px;color:var(--white);font-size:14px;font-family:'DM Sans',sans-serif;resize:vertical;outline:none}
.ta:focus{border-color:rgba(47,167,188,.3)}
/* Result bars */
.dbar{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.dbar-lbl{font-size:10px;color:var(--text);min-width:50px}
.dbar-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.dbar-fill{height:100%;border-radius:4px;transition:width 1s}
.dbar-val{font-size:12px;font-weight:800;min-width:32px;text-align:right;font-family:Syne,sans-serif}
/* Score ring */
.ring{position:relative;width:130px;height:130px;margin:0 auto 14px}
.ring svg{width:130px;height:130px;transform:rotate(-90deg)}
.ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
/* Mode cards */
.mode-card{padding:18px;border-radius:14px;border:1.5px solid rgba(255,255,255,.06);background:var(--bg2);cursor:pointer;transition:all .2s;margin-bottom:10px}
.mode-card:hover,.mode-card.sel{border-color:var(--cyan);box-shadow:var(--glow)}
.mode-card .mc-title{font-family:Syne,sans-serif;font-size:20px;font-weight:800;letter-spacing:1px}
.mode-card .mc-sub{font-size:11px;color:var(--muted);margin-top:4px}
.mode-card .mc-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:1px;margin-top:8px}
/* Footer */
.foot{text-align:center;padding:20px 0;margin-top:20px}
@media(max-width:360px){.s7{height:42px;font-size:15px}.qt{font-size:15px}}
</style>
</head>

];

// Load club config from Sheet (custom questions, club name)
function loadClubConfig(code,callback){
  try{
    fetch(SH+"?action=getClubConfig&code="+encodeURIComponent(code))
    .then(function(r){return r.json()})
    .then(function(cfg){
      if(cfg&&cfg.name)CLUB_NAME=cfg.name;
      if(cfg&&cfg.questions&&cfg.questions.length){
        QCUSTOM=[];
        for(var i=0;i<Math.min(5,cfg.questions.length);i++){
          var q=cfg.questions[i];
          q.i=95+i;q.s="custom";
          if(!q.type)q.type="scale";
          QCUSTOM.push(q);
        }
      }
      CLUB_LOADED=true;
      if(callback)callback();
    })
    .catch(function(){CLUB_LOADED=true;if(callback)callback()});
  }catch(e){CLUB_LOADED=true;if(callback)callback()}
  // Timeout fallback
  setTimeout(function(){if(!CLUB_LOADED){CLUB_LOADED=true;if(callback)callback()}},3000);
}

// Build question list based on mode
function buildQ(){
  ALLQ=QP.slice();
  var add=function(arr){for(var i=0;i<arr.length;i++){if(MODE==="core"||arr[i].p)ALLQ.push(arr[i])}};
  var qzNoText=QZ.filter(function(q){return q.type!=="text"});
  var qzText=QZ.filter(function(q){return q.type==="text"});
  add(QI);add(QS);add(QE);add(qzNoText);
  // Add custom questions (always shown)
  for(var i=0;i<QCUSTOM.length;i++)ALLQ.push(QCUSTOM[i]);
  // Always add freitext at end
  for(var i=0;i<qzText.length;i++)ALLQ.push(qzText[i]);
}

function getSec(q){
  if(q.s==="custom")return SEC[5];
  if(q.i<=5)return SEC[0];
  if(q.i<=29)return SEC[1];
  if(q.i<=49)return SEC[2];
  if(q.i<=69)return SEC[3];
  return SEC[4];
}

// ═══ SCORING ═══
function calcSec(secKey){
  var ranges={intern:[10,29],sport:[30,49],extern:[50,69],zukunft:[70,89],custom:[95,98]};
  var r=ranges[secKey];if(!r)return{pct:0,n:0};
  var sum=0,n=0;
  for(var i=r[0];i<=r[1];i++){if(typeof ANS[i]==="number"){sum+=ANS[i];n++}}
  if(!n)return{pct:0,n:0};
  return{avg:Math.round(sum/n*10)/10,pct:Math.round(((sum/n-1)/6)*100),n:n};
}
function calcTotal(){
  var keys=["intern","sport","extern","zukunft"],t=0,c=0;
  for(var i=0;i<keys.length;i++){var s=calcSec(keys[i]);if(s.n>0){t+=s.pct;c++}}
  return c?Math.round(t/c):0;
}

// ═══ SEND ═══
function send(d){
  try{var j=JSON.stringify(d);var e=encodeURIComponent(j);
  new Image().src=SH+"?data="+e+"&t="+Date.now();
  try{fetch(SH,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"data="+e}).catch(function(){})}catch(x){}
  }catch(x){}
}

function radar(scores){
  var dims=[{k:"intern",l:"Intern",co:"#2FA7BC"},{k:"sport",l:"Sport",co:"#34D399"},{k:"extern",l:"Extern",co:"#FB923C"},{k:"zukunft",l:"Zukunft",co:"#FBBF24"},{k:"custom",l:"Verein",co:"#F472B6"}];

  [.25,.5,.75,1].forEach(function(s){var p='';for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;p+=(cx+s*R*Math.cos(a)).toFixed(1)+','+(cy+s*R*Math.sin(a)).toFixed(1)+' '}o+='<polygon points="'+p+'" fill="none" stroke="rgba(47,167,188,.05)"/>'});

  var pts='',dots='';

  o+='<polygon points="'+pts+'" fill="rgba(47,167,188,.08)" stroke="var(--cyan)" stroke-width="2"/>'+dots+'</svg>';

  // Calibration
  var life=ANS[1]||4;var active=ANS[4]||4;
  var bias=life<=2&&active<=2?"negativ":life>=6&&active>=6?"positiv":"neutral";

  // Send
  if(!window._s){window._s=true;
    send({type:"clubcheck",mode:MODE,code:CODE,name:NM||"Anonym",team:CODE,role:ANS[3]||"",tenure:ANS[2]||"",nps:nps,calibration:{life:life,active:active,bias:bias},scores:{total:total,intern:sc.intern,sport:sc.sport,extern:sc.extern,zukunft:sc.zukunft,custom:sc.custom},answers:ANS,freitext:ANS[90]||""})
  }

  o+='<div style="animation:fadeUp .5s ease">';
  o+='<div class="top"><span class="top-l">HUMATRIX</span><span style="font-size:9px;color:var(--cyan);font-weight:700;letter-spacing:1px;padding:3px 8px;border:1px solid rgba(47,167,188,.2);border-radius:10px">ERGEBNIS · '+CODE+'</span></div>';

  // Score card
  o+='<div class="gc glow" style="text-align:center;padding:24px 18px;position:relative">';
  o+='<div style="position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(47,167,188,.3),transparent);animation:scan 4s linear infinite"></div>';
  o+='<div style="font-size:9px;font-weight:700;letter-spacing:3px;color:'+sCol+';margin-bottom:10px">STATUS: '+status+'</div>';
  // Ring
  var circ=2*Math.PI*54;var dash=circ*total/100;
  o+='<div class="ring"><svg viewBox="0 0 130 130"><circle cx="65" cy="65" r="54" fill="none" stroke="var(--bg3)" stroke-width="7"/>';
  o+='<circle cx="65" cy="65" r="54" fill="none" stroke="'+sCol+'" stroke-width="7" stroke-linecap="round" stroke-dasharray="'+dash.toFixed(1)+' '+circ.toFixed(1)+'"/>';
  o+='</svg><div class="ring-c"><span style="font-family:Syne,sans-serif;font-size:40px;font-weight:900;color:'+sCol+'">'+total+'</span><span style="font-size:8px;color:var(--muted)">/100 ClubScore</span></div></div>';
  o+='<div style="font-size:10px;color:var(--muted)">'+esc(CODE)+' · '+(NM||'Anonym')+' · '+(ANS[3]||'')+' · '+MODE.toUpperCase()+'</div>';
  o+='</div>';

  // NPS
  if(nps!==undefined){
    o+='<div class="gc" style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px">';
    o+='<div><div style="font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1.5px">WEITEREMPFEHLUNG</div></div>';
    o+='<div style="text-align:right"><span style="font-family:Syne,sans-serif;font-size:22px;font-weight:900;color:'+npsCol+'">'+nps+'/10</span>';
    o+='<div style="font-size:9px;font-weight:700;color:'+npsCol+'">'+npsType+'</div></div></div>';
  }

  // Calibration
  if(bias!=="neutral"){
    var bCol=bias==="negativ"?"var(--orange)":"var(--blue)";
    o+='<div class="gc" style="border-color:'+bCol+';padding:12px 14px">';
    o+='<div style="font-size:8px;font-weight:700;color:'+bCol+';letter-spacing:1.5px;margin-bottom:3px">⚡ KALIBRIERUNG</div>';
    o+='<p style="font-size:10px;color:var(--text)">'+(bias==="negativ"?"Niedrige Lebenszufriedenheit + geringes Engagement — Antworten könnten systematisch kritischer sein.":"Hohe Zufriedenheit + starkes Engagement — Antworten könnten systematisch positiver ausfallen.")+'</p></div>';
  }

  // Radar
  o+='<div class="gc" style="text-align:center"><div style="font-size:9px;font-weight:700;color:var(--cyan);letter-spacing:2px;margin-bottom:10px">VEREINSPROFIL</div>'+radar(sc)+'</div>';

  // Dimensions
  o+='<div class="gc"><div style="font-size:9px;font-weight:700;color:var(--cyan);letter-spacing:2px;margin-bottom:12px">📊 BEREICHSANALYSE</div>';
  var dims=[{k:"intern",l:"Vereinsintern",co:"#2FA7BC",ic:"⚙️"},{k:"sport",l:"Sportlich",co:"#34D399",ic:"⚽"},{k:"extern",l:"Vereinsextern",co:"#FB923C",ic:"🌍"},{k:"zukunft",l:"Zukunft",co:"#FBBF24",ic:"🚀"}];
  dims.sort(function(a,b){return (sc[a.k]||0)-(sc[b.k]||0)});
  for(var di=0;di<dims.length;di++){
    var d=dims[di];var v=sc[d.k]||0;var c2=v>=70?"var(--green)":v>=45?"var(--gold)":"var(--red)";
    var lb=v>=70?"Stark":v>=45?"Ausbaufähig":"Kritisch";
    o+='<div style="padding:10px;background:var(--bg);border-radius:10px;margin-bottom:6px;border-left:3px solid '+d.co+'">';
    o+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">';
    o+='<span style="font-size:12px;font-weight:600">'+d.ic+' '+d.l+'</span>';
    o+='<span style="font-family:Syne,sans-serif;font-size:16px;font-weight:900;color:'+c2+'">'+v+'%</span></div>';
    o+='<div class="dbar"><div class="dbar-track"><div class="dbar-fill" style="width:'+v+'%;background:'+d.co+'"></div></div>';
    o+='<span style="font-size:9px;font-weight:700;color:'+c2+'">'+lb+'</span></div></div>';
  }
  o+='</div>';

  // Freitext
  if(ANS[90]){o+='<div class="gc" style="border-color:rgba(251,191,36,.15)"><div style="font-size:8px;font-weight:700;color:var(--gold);letter-spacing:1.5px;margin-bottom:5px">💬 EMPFEHLUNG AN DEN VORSTAND</div><p style="font-size:12px;color:var(--text);line-height:1.6;font-style:italic">"'+esc(ANS[90])+'"</p></div>'}

  // CTA
  o+='<div class="gc glow" style="text-align:center;padding:18px">';
  o+='<div style="font-size:10px;font-weight:700;color:var(--cyan);margin-bottom:4px">Vertiefte Analyse gewünscht?</div>';
  o+='<p style="font-size:11px;color:var(--text);margin-bottom:8px">12 spezialisierte Matrix-Analysen · Professionelle Begleitung</p>';
  o+='<div style="font-size:11px;color:var(--cyan);font-weight:600">bernhard@humatrix.cc · sales.humatrix.cc</div></div>';

  o+='<button data-act="goReset" class="btn2">← NEUER TEST</button>';
  o+='<div class="foot"><div style="font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:3px">POWERED BY</div>';
  o+='<div style="font-family:Syne,sans-serif;font-size:15px;font-weight:900;color:var(--cyan);letter-spacing:3px">HUMATRIX</div>';
  o+='<div style="font-size:7px;color:var(--muted);margin-top:2px">The Mind Club Company</div></div>';
  o+='</div>';
  $.innerHTML=o;return;
}
$.innerHTML='';
}

// ═══ EVENTS ═══
document.addEventListener("click",function(e){
  var el=e.target;while(el&&!el.dataset.act)el=el.parentElement;if(!el)return;
  var act=el.dataset.act;
  if(act==="goStart"){V="start";R();return}
  if(act==="selPulse"){MODE="pulse";R();return}
  if(act==="selCore"){MODE="core";R();return}
  if(act==="goSurvey"&&MODE){buildQ();QI_IDX=0;V="survey";R();return}
  if(act==="goResult"){V="result";R();return}
  if(act==="goStart"){V="start";R();return}
  if(act.indexOf("rqt_")===0){var pp=act.split("_");REG.questions[parseInt(pp[1])].type=pp[2];R();return}
  if(act.indexOf("rAddOpt_")===0){var qi3=parseInt(act.split("_")[1]);if(REG.questions[qi3].opts.length<6)REG.questions[qi3].opts.push("");R();return}
  if(act.indexOf("rDelOpt_")===0){var pp2=act.split("_");var qi4=parseInt(pp2[1]);var oi3=parseInt(pp2[2]);if(REG.questions[qi4].opts.length>2)REG.questions[qi4].opts.splice(oi3,1);R();return}
  if(act==="goReset"){V="start";MODE="";CODE="";NM="";ANON=false;ANS={};QI_IDX=0;window._s=false;R();return}
  if(act==="prev"){QI_IDX=Math.max(0,QI_IDX-1);R();return}
  if(act==="next"){QI_IDX=Math.min(ALLQ.length-1,QI_IDX+1);R();return}
  if(act.indexOf("a_")===0){var p=act.split("_");ANS[parseInt(p[1])]=parseInt(p[2]);if(QI_IDX<ALLQ.length-1)setTimeout(function(){QI_IDX++;R()},200);else R();return}
  if(act.indexOf("c_")===0){var p=act.split("_");var qi=parseInt(p[1]);var ci=parseInt(p[2]);var q=ALLQ.filter(function(x){return x.i===qi})[0];if(q&&q.opts)ANS[qi]=q.opts[ci];if(QI_IDX<ALLQ.length-1)setTimeout(function(){QI_IDX++;R()},200);else R();return}
});
R();
}catch(e){document.getElementById("err").style.display="block";document.getElementById("err").textContent=e.message}
</script>
