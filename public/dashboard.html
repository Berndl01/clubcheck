*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#030B15;--bg2:#0A1628;--bg3:#111E33;--cyan:#00D4FF;--gold:#FBBF24;--green:#34D399;--red:#F87171;--orange:#FB923C;--purple:#A78BFA;--blue:#60A5FA;--white:#E8F0F8;--muted:#4A6478;--text:#93AABB;--pink:#F472B6}
html,body{min-height:100dvh;background:var(--bg);font-family:'Barlow',Arial,sans-serif;color:var(--white)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,212,255,.1)}50%{box-shadow:0 0 40px rgba(0,212,255,.2)}}
@keyframes scan{0%{top:-1px}100%{top:100%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.w{max-width:720px;margin:0 auto;padding:16px 18px}
.gc{background:linear-gradient(145deg,rgba(10,22,40,.95),rgba(17,30,51,.8));border:1px solid rgba(0,212,255,.07);border-radius:16px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.gc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.15),transparent)}
.gc.glow{border-color:rgba(0,212,255,.2);box-shadow:0 0 30px rgba(0,212,255,.08)}
.top{display:flex;justify-content:space-between;align-items:center;padding:6px 0 14px}
.inp{padding:14px 16px;background:var(--bg2);border:1.5px solid rgba(0,212,255,.1);border-radius:12px;color:var(--white);font-size:15px;font-family:'Barlow',sans-serif;outline:none;width:100%;margin-bottom:10px}
.inp:focus{border-color:rgba(0,212,255,.35)}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:2px;cursor:pointer;margin-top:8px}
.btn.go{background:linear-gradient(135deg,var(--cyan),#0ABFEA);color:var(--bg);animation:glow 3s infinite}
.btn.off{background:var(--bg3);color:var(--muted);cursor:default}
.btn2{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(0,212,255,.1);background:transparent;color:var(--cyan);font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;font-family:'Barlow',sans-serif}
.lbl{font-size:11px;color:var(--cyan);font-weight:600;letter-spacing:.5px;margin-bottom:5px}
.stag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:14px;font-size:9px;font-weight:700;letter-spacing:1.5px;margin-bottom:10px}
.ring{position:relative;width:160px;height:160px;margin:0 auto 14px}
.ring svg{width:160px;height:160px;transform:rotate(-90deg)}
.ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.stat{text-align:center;padding:14px;background:var(--bg);border-radius:10px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900}
.stat-lbl{font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px}
.dim-row{padding:12px;background:var(--bg);border-radius:10px;margin-bottom:6px}
.dim-bar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-top:6px}
.dim-fill{height:100%;border-radius:4px;transition:width 1.5s ease}
.qbar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:4px}
.qbar-text{flex:1;font-size:11px;color:var(--text);line-height:1.3}
.qbar-track{width:100px;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;flex-shrink:0}
.qbar-fill{height:100%;border-radius:3px}
.qbar-val{font-size:11px;font-weight:700;min-width:32px;text-align:right;font-family:'Barlow Condensed',sans-serif}
.role-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.role-lbl{font-size:10px;min-width:70px;color:var(--text)}
.role-bars{flex:1;display:flex;gap:3px}
.role-seg{height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:width 1s}
.ft-card{padding:12px;background:var(--bg);border-radius:10px;margin-bottom:6px;border-left:3px solid var(--gold)}
.ft-card p{font-size:12px;color:var(--text);line-height:1.6;font-style:italic}
.ft-meta{font-size:9px;color:var(--muted);margin-top:4px}
.tab-row{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.tab-btn{padding:8px 14px;border-radius:10px;border:1px solid rgba(0,212,255,.1);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Barlow',sans-serif;transition:all .15s}
.tab-btn.on{border-color:var(--cyan);background:rgba(0,212,255,.08);color:var(--cyan)}
.share-box{background:var(--bg);border:1px solid rgba(0,212,255,.15);border-radius:10px;padding:14px;text-align:center;margin-bottom:10px}
.share-link{font-size:13px;color:var(--cyan);word-break:break-all;font-weight:600;padding:8px;background:var(--bg2);border-radius:6px;margin:8px 0;display:block;cursor:pointer}
.foot{text-align:center;padding:20px 0;margin-top:20px}
@media(max-width:500px){.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.qbar-track{width:70px}}
</style>

// Generate code from name
function genCode(name){
  var w=name.toUpperCase().replace(/[^A-Z]/g,"").substring(0,3);

function loadDash(code,cb){
  DATA=null;
  sb.rpc("get_dashboard",{p_code:code})
  .then(function(res){
    if(res.data){DATA=res.data;cb()}
    else{DATA={error:res.error?res.error.message:"Keine Daten",count:0};cb()}
  })
  .catch(function(e){DATA={error:e.message,count:0};cb()});
  setTimeout(function(){if(!DATA){DATA={error:"Timeout",count:0};cb()}},10000);
}

function radar(sc){
  var dims=[{k:"intern",l:"Intern",co:"#00D4FF"},{k:"sport",l:"Sport",co:"#34D399"},{k:"extern",l:"Extern",co:"#FB923C"},{k:"zukunft",l:"Zukunft",co:"#FBBF24"}];
  var cx=140,cy=130,MR=90,n=4;
  var o='<svg viewBox="0 0 280 260" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:340px;margin:0 auto;display:block">';
  [.25,.5,.75,1].forEach(function(s){var p='';for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;p+=(cx+s*MR*Math.cos(a)).toFixed(1)+','+(cy+s*MR*Math.sin(a)).toFixed(1)+' '}o+='<polygon points="'+p+'" fill="none" stroke="rgba(0,212,255,.05)"/>'});
  for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;o+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+MR*Math.cos(a)).toFixed(1)+'" y2="'+(cy+MR*Math.sin(a)).toFixed(1)+'" stroke="rgba(0,212,255,.04)"/>'}
  var pts='',dots='';
  for(var i=0;i<n;i++){var d=dims[i];var pct=(sc[d.k]||0)/100;var a=Math.PI*2*i/n-Math.PI/2;
    var px=cx+pct*MR*Math.cos(a),py=cy+pct*MR*Math.sin(a);
    pts+=px.toFixed(1)+','+py.toFixed(1)+' ';
    dots+='<circle cx="'+px.toFixed(1)+'" cy="'+py.toFixed(1)+'" r="5" fill="'+d.co+'" stroke="var(--bg)" stroke-width="2"/>';
    var lx=cx+(MR+20)*Math.cos(a),ly=cy+(MR+20)*Math.sin(a);
    dots+='<text x="'+lx.toFixed(1)+'" y="'+(ly+3).toFixed(1)+'" fill="'+d.co+'" font-size="11" text-anchor="middle" font-family="Barlow Condensed" font-weight="700">'+d.l+'</text>';
    dots+='<text x="'+lx.toFixed(1)+'" y="'+(ly+16).toFixed(1)+'" fill="#4A6478" font-size="10" text-anchor="middle" font-family="Barlow">'+(sc[d.k]||0)+'%</text>'}
  o+='<polygon points="'+pts+'" fill="rgba(0,212,255,.1)" stroke="var(--cyan)" stroke-width="2.5"/>'+dots+'</svg>';
  return o;
}

// ═══ PREMIUM INTERPRETATION ENGINE ═══
function interpret(data){
  var sc=data.avgScores||{};var t=sc.total||0;var cnt=data.count||0;
  var club=data.name||"Verein";

document.addEventListener("click",function(e){
  var el=e.target;while(el&&!el.dataset.act)el=el.parentElement;if(!el)return;
  var act=el.dataset.act;
  if(act==="goHome"){V="home";TAB="overview";DATA=null;R();return}
  if(act==="goLogin"){V="login";R();return}
  if(act==="goRegister"){V="register";R();return}
  if(act==="goQuestions"&&REG.name.length>=2){V="questions";R();return}
  if(act==="goDemo"){CODE="DEMO";DATA=demoData();V="dash";TAB="overview";R();return}
  if(act==="goLoad"&&CODE.length>=3){V="loading";R();loadDash(CODE,function(){V="dash";TAB="overview";R()});return}
  if(act==="reload"){V="loading";R();DATA=null;loadDash(CODE,function(){V="dash";R()});return}
  // Question type selector
  if(act.indexOf("qt_")===0){var pp=act.split("_");REG.questions[parseInt(pp[1])].type=pp[2];R();return}
  // Add/remove option
  if(act.indexOf("addOpt_")===0){var qi3=parseInt(act.split("_")[1]);if(REG.questions[qi3].opts.length<6)REG.questions[qi3].opts.push("");R();return}
  if(act.indexOf("delOpt_")===0){var pp2=act.split("_");var qi4=parseInt(pp2[1]);var oi3=parseInt(pp2[2]);if(REG.questions[qi4].opts.length>2)REG.questions[qi4].opts.splice(oi3,1);R();return}
  if(act==="doRegister"&&REG.name.length>=2){
    CODE=genCode(REG.name);
    var payload={type:"club_register",code:CODE,name:REG.name,contact:REG.contact,email:REG.email};
    for(var qi=0;qi<5;qi++){
      var cq=REG.questions[qi];
      if(cq.text){
        payload["q"+(qi+1)+"_text"]=cq.text;
        payload["q"+(qi+1)+"_type"]=cq.type;
        if(cq.type==="choice"){
          var validOpts=cq.opts.filter(function(o){return o.trim().length>0});
          if(validOpts.length>0)payload["q"+(qi+1)+"_opts"]=validOpts.join("|");
        }
      }
    }
    send(payload);
    V="created";R();return;
  }
  if(act.indexOf("tab_")===0){TAB=act.substring(4);R();return}
  if(act==="genPDF"){generatePDF();return}
  if(act==="copyLink"){
    var link=SURVEY_URL+"?c="+CODE;
    function doCopy(txt,btnId){
      var b=document.getElementById(btnId||"copyBtn");
      function ok(){if(b){b.textContent="\u2713 Kopiert!";b.style.color="var(--green)";setTimeout(function(){b.textContent="\ud83d\udccb LINK KOPIEREN";b.style.color=""},2000)}}
      try{if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).then(ok);return}}catch(e){}
      var ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();
      try{document.execCommand("copy");ok()}catch(e2){if(b)b.textContent="Bitte manuell kopieren"}
      document.body.removeChild(ta);
    }
    doCopy(link);
    return;
  }
  if(act==="copyWA"){
    var waEl=document.getElementById("waText");
    if(waEl){
      var txt=waEl.textContent;
      try{if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).then(function(){el.textContent="\u2713 Kopiert!";el.style.color="var(--green)";setTimeout(function(){el.textContent="\ud83d\udce4 WhatsApp-Text kopieren";el.style.color=""},2000)});return}}catch(e){}
      var ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();

      document.body.removeChild(ta);
    }

  }
});
